name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: chalkraw
            asset: chalkraw-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: chalkraw.exe
            asset: chalkraw-windows-x86_64.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: chalkraw
            asset: chalkraw-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI deps (eframe / wgpu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-x11-0 \
            libxkbcommon-dev \
            libwayland-dev \
            libgtk-3-dev

      - name: Install Rust toolchain (per rust-toolchain.toml)
        run: rustup show

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release -p chalkraw-ui --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p stage
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "stage/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: stage/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
